  <text x="154.000" y="159.000" text-anchor="start" font-size="1.9" class="note-txt">1.  ALL DIMENSIONS IN MILLIMETRES UNLESS STATED.</text>
  <text x="154.000" y="167.000" text-anchor="start" font-size="1.9" class="note-txt">2.  INLET POSITIONS ARE DEFINED BY ANGLE FROM NORTH (12 O'CLOCK) CLOCKWISE AND</text>

  <text x="154.000" y="175.000" text-anchor="start" font-size="1.9" class="note-txt">3.  OUTLET SIZE O225 TWINWALL IS RULE-ENGINE LOCKED. DO NOT REDUCE. REF:</text>

  <text x="154.000" y="187.000" text-anchor="start" font-size="1.9" class="note-txt">    BASE.</text>
  <text x="154.000" y="191.000" text-anchor="start" font-size="1.9" class="note-txt">5.  MAX ADOPTABLE DEPTH: 2000mm TO PIPE SOFFIT. MAX NON-ADOPTABLE: 3000mm TOTAL</text>

  <text x="154.000" y="199.000" text-anchor="start" font-size="1.9" class="note-txt">6.  ALL PIPE JOINT SEALS TO BS EN 681-1. LUBRICANT TO MANUFACTURERS</text>
